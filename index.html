<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🔥推荐货盘🔥</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f8f3fb;
  --panel: rgba(255, 255, 255, 0.84);
  --ink: #1b2430;
  --muted: #687385;
  --line: rgba(223, 228, 234, 0.78);
  --brand: #116a73;
  --brand-dark: #0d535b;
  --accent: #b07a2a;
  --danger: #b3261e;
  --shadow: 0 14px 34px rgba(28, 38, 48, 0.09);
}

* {
  box-sizing: border-box;
}

[hidden] {
  display: none !important;
}

body {
  position: relative;
  isolation: isolate;
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.62), transparent 30%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.78));
}

.grainient-background {
  position: fixed;
  inset: 0;
  z-index: -2;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
  background: #f8f3fb;
}

.grainient-background canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 28px clamp(20px, 4vw, 56px);
  background: rgba(255, 255, 255, 0.72);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(22px) saturate(1.2);
  -webkit-backdrop-filter: blur(22px) saturate(1.2);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--brand);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1 {
  margin: 0;
  font-size: clamp(24px, 3vw, 34px);
  line-height: 1.15;
}

main {
  width: min(1440px, 100%);
  margin: 0 auto;
  padding: 24px clamp(16px, 4vw, 56px) 48px;
}

.upload-button,
button,
select,
input {
  font: inherit;
}

.upload-button,
button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  border: 0;
  border-radius: 8px;
  background: var(--brand);
  color: #fff;
  padding: 0 18px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}

.upload-button:hover,
button:hover {
  background: var(--brand-dark);
}

button:disabled {
  background: #c7ced6;
  color: #f8fafc;
  cursor: not-allowed;
}

button:disabled:hover {
  background: #c7ced6;
}

.upload-button input {
  position: absolute;
  inline-size: 1px;
  block-size: 1px;
  opacity: 0;
  pointer-events: none;
}

.module-tabs {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  padding: 8px;
  background: linear-gradient(180deg, #ffffff 0%, #f7f9fb 100%);
  border: 1px solid #e8edf3;
  border-radius: 16px;
  box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
}

.module-tab {
  min-height: 44px;
  border-radius: 12px;
  background: transparent;
  color: var(--muted);
  padding: 0 14px;
  border: 1px solid transparent;
  transition: background-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

.module-tab:hover {
  background: #f2f7f7;
  color: var(--brand-dark);
  transform: translateY(-1px);
}

.module-tab.is-active {
  background: linear-gradient(135deg, #116a73 0%, #16838e 100%);
  color: #fff;
  box-shadow: 0 10px 20px rgba(17, 106, 115, 0.22);
}

.module-tab span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 20px;
  margin-left: 6px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.16);
  color: currentColor;
  padding: 0 6px;
  font-size: 12px;
}

.toolbar {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) repeat(3, minmax(126px, 180px)) auto;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
}

.selection-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
  padding: 12px 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
}

.select-all-control,
.pool-check {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--ink);
  font-size: 14px;
  font-weight: 650;
}

.select-all-control input,
.pool-check input {
  width: 16px;
  min-height: 16px;
  height: 16px;
  margin: 0;
  accent-color: var(--brand);
}

#clearPoolButton {
  background: #2d3748;
}

#clearPoolButton:hover {
  background: #172033;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 44px;
  padding: 0 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
}

.search-box span {
  color: var(--muted);
  font-size: 22px;
  line-height: 1;
}

input,
select {
  width: 100%;
  min-height: 44px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
  padding: 0 12px;
  outline: none;
}

.search-box input {
  min-height: 40px;
  border: 0;
  padding: 0;
}

input:focus,
select:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(17, 106, 115, 0.13);
}

#resetButton {
  background: #2d3748;
}

#resetButton:hover {
  background: #172033;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.stats div,
.notice,
.empty {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  backdrop-filter: blur(18px) saturate(1.14);
  -webkit-backdrop-filter: blur(18px) saturate(1.14);
}

.stats div {
  padding: 18px;
}

.stats span {
  display: block;
  min-height: 34px;
  color: var(--ink);
  font-size: 28px;
  font-weight: 800;
  line-height: 1.1;
}

#updatedAt {
  min-height: 22px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 650;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.stats p {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.notice {
  margin-bottom: 18px;
  padding: 13px 16px;
  color: var(--brand-dark);
  font-weight: 650;
}

.notice.error {
  color: var(--danger);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(208px, 1fr));
  gap: 14px;
}

.product-card {
  min-width: 0;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.88);
  border: 1px solid rgba(237, 240, 243, 0.82);
  border-radius: 6px;
  backdrop-filter: blur(12px) saturate(1.08);
  -webkit-backdrop-filter: blur(12px) saturate(1.08);
  box-shadow: 0 8px 22px rgba(28, 38, 48, 0.06);
}

.image-wrap {
  position: relative;
  aspect-ratio: 1 / 1;
  background: #eef1f4;
}

.image-wrap img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.image-wrap img.is-missing {
  object-fit: contain;
  padding: 32px;
}

.tag {
  position: absolute;
  left: 10px;
  top: 10px;
  max-width: calc(100% - 20px);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.92);
  color: var(--brand-dark);
  padding: 5px 9px;
  font-size: 12px;
  font-weight: 700;
}

.select-button {
  position: absolute;
  left: 50%;
  bottom: 12px;
  transform: translateX(-50%);
  min-height: 34px;
  border-radius: 6px;
  padding: 0 18px;
  background: rgba(17, 106, 115, 0.94);
  box-shadow: 0 10px 24px rgba(16, 24, 40, 0.18);
  opacity: 0;
  transition: opacity 0.16s ease, transform 0.16s ease;
}

.product-card:hover .select-button,
.select-button:focus-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(-2px);
}

.select-button:disabled {
  background: rgba(148, 163, 184, 0.95);
  color: #fff;
}

.pool-check {
  position: absolute;
  left: 10px;
  bottom: 10px;
  min-height: 30px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.94);
  padding: 5px 9px;
  box-shadow: 0 8px 18px rgba(16, 24, 40, 0.12);
}

.card-body {
  padding: 9px 12px 11px;
}

.product-title {
  display: block;
  min-height: 0;
  color: var(--ink);
  font-size: 14px;
  font-weight: 650;
  line-height: 1.3;
  text-decoration: none;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
}

.product-title:hover {
  color: var(--brand-dark);
  text-decoration: underline;
}

.store-line {
  margin: 6px 0 0;
  color: var(--ink);
  font-size: 12px;
  font-weight: 650;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.meta {
  margin: 4px 0 7px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.3;
  min-height: 0;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
}

.commerce-line,
.signal-line,
.sub-signal {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
}

.commerce-line {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.25;
}

.price {
  color: #374151;
  font-weight: 650;
}

.divider {
  width: 1px;
  height: 10px;
  background: var(--line);
}

.signal-line {
  margin-top: 6px;
  color: var(--ink);
  font-size: 12px;
  line-height: 1.25;
}

.signal-line strong {
  font-weight: 650;
}

.gpm-tier,
.affiliate {
  display: inline-flex;
  align-items: center;
  min-height: 19px;
  border-radius: 4px;
  background: #eef3f2;
  color: var(--brand-dark);
  padding: 1px 5px;
  font-weight: 650;
}

.gpm-tier.is-high {
  background: #fff1f8;
  color: #d10073;
  font-weight: 800;
}

.affiliate {
  background: #f1f2f4;
  color: #4b5563;
}

.sub-signal {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.25;
}

.metric-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
  margin: 9px 0 0;
}

.metric-list div {
  min-width: 0;
  padding: 6px 7px;
  border: 1px solid rgba(223, 228, 234, 0.78);
  border-radius: 6px;
  background: rgba(248, 250, 252, 0.72);
}

.metric-list dt {
  margin: 0 0 3px;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.1;
}

.metric-list dd {
  margin: 0;
  color: var(--ink);
  font-size: 12px;
  font-weight: 750;
  line-height: 1.18;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.empty {
  padding: 56px 24px;
  text-align: center;
}

.empty h2 {
  margin: 0 0 8px;
  font-size: 22px;
}

.empty p {
  margin: 0;
  color: var(--muted);
}

@media (max-width: 860px) {
  .topbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .toolbar,
  .stats {
    grid-template-columns: 1fr 1fr;
  }

  .search-box {
    grid-column: 1 / -1;
  }
}

@media (max-width: 560px) {
  .toolbar,
  .stats,
  .grid {
    grid-template-columns: 1fr;
  }

  .upload-button {
    width: 100%;
  }
}

</style>
</head>
<body>
  <div id="grainientBackground" class="grainient-background" aria-hidden="true"></div>
  <header class="topbar">
    <div>
      <p class="eyebrow">E-commerce Selection</p>
      <h1>🔥推荐货盘🔥</h1>
    </div>
    <div class="header-actions">
      <button id="exportButton" type="button" disabled>导出</button>
      <label class="upload-button" for="fileInput">
        <span>上传明细</span>
        <input id="fileInput" type="file" accept=".csv,.xlsx,.xls,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel">
      </label>
    </div>
  </header>

  <main>
    <nav class="module-tabs" aria-label="一级导航">
      <button class="module-tab is-active" id="productPoolTab" type="button">商品池</button>
      <button class="module-tab" id="selectionPoolTab" type="button">圈品池 <span id="poolCount">0</span></button>
    </nav>

    <section class="toolbar" id="productToolbar" aria-label="商品筛选">
      <div class="search-box">
        <span aria-hidden="true">⌕</span>
        <input id="searchInput" type="search" placeholder="搜索 SPU、店铺或类目">
      </div>
      <select id="tagFilter" aria-label="标签筛选"></select>
      <select id="categoryFilter" aria-label="三级类目筛选"></select>
      <select id="leafCategoryFilter" aria-label="叶子类目筛选"></select>
      <button id="resetButton" type="button">刷新 data.csv</button>
    </section>

    <section class="selection-toolbar" id="selectionToolbar" aria-label="圈品池操作" hidden>
      <label class="select-all-control">
        <input id="selectAllInput" type="checkbox">
        <span>全选当前圈品</span>
      </label>
      <button id="clearPoolButton" type="button">清空圈品池</button>
    </section>

    <section class="stats" aria-label="数据概览">
      <div>
        <span id="totalCount">0</span>
        <p>当前商品</p>
      </div>
      <div>
        <span id="storeCount">0</span>
        <p>店铺数量</p>
      </div>
      <div>
        <span id="categoryCount">0</span>
        <p>三级类目</p>
      </div>
      <div>
        <span id="updatedAt">初始数据</span>
        <p>数据来源</p>
      </div>
    </section>

    <section class="notice" id="notice" hidden></section>

    <section class="grid" id="productGrid" aria-label="商品列表"></section>
    <section class="empty" id="emptyState" hidden>
      <h2>暂无匹配商品</h2>
      <p>请调整搜索词或筛选条件。</p>
    </section>
  </main>

  <template id="productCardTemplate">
    <article class="product-card">
      <div class="image-wrap">
        <img alt="" loading="lazy">
        <span class="tag"></span>
        <button class="select-button" type="button">Select</button>
        <label class="pool-check">
          <input class="pool-checkbox" type="checkbox">
          <span>选择</span>
        </label>
      </div>
      <div class="card-body">
        <a class="spu product-title" target="_blank" rel="noreferrer"></a>
        <dl class="metric-list">
          <div><dt>内容场占比</dt><dd class="content-share"></dd></div>
          <div><dt>直播占比</dt><dd class="live-share"></dd></div>
          <div><dt>US销量占比</dt><dd class="us-share"></dd></div>
          <div><dt>UK销量占比</dt><dd class="uk-share"></dd></div>
          <div><dt>销量排名</dt><dd class="sales-rank"></dd></div>
          <div><dt>是否在联盟</dt><dd class="affiliate"></dd></div>
          <div><dt>大码参考价</dt><dd class="price"></dd></div>
          <div><dt>上架时间</dt><dd class="date"></dd></div>
        </dl>
      </div>
    </article>
  </template>

  <script type="module">
import { Renderer, Program, Mesh, Triangle } from "https://cdn.jsdelivr.net/npm/ogl@1.0.11/+esm";

const hexToRgb = (hex) => {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if (!result) return [1, 1, 1];
  return [
    parseInt(result[1], 16) / 255,
    parseInt(result[2], 16) / 255,
    parseInt(result[3], 16) / 255
  ];
};

const vertex = `#version 300 es
in vec2 position;
void main() {
  gl_Position = vec4(position, 0.0, 1.0);
}
`;

const fragment = `#version 300 es
precision highp float;
uniform vec2 iResolution;
uniform float iTime;
uniform float uTimeSpeed;
uniform float uColorBalance;
uniform float uWarpStrength;
uniform float uWarpFrequency;
uniform float uWarpSpeed;
uniform float uWarpAmplitude;
uniform float uBlendAngle;
uniform float uBlendSoftness;
uniform float uRotationAmount;
uniform float uNoiseScale;
uniform float uGrainAmount;
uniform float uGrainScale;
uniform float uGrainAnimated;
uniform float uContrast;
uniform float uGamma;
uniform float uSaturation;
uniform vec2 uCenterOffset;
uniform float uZoom;
uniform vec3 uColor1;
uniform vec3 uColor2;
uniform vec3 uColor3;
out vec4 fragColor;
#define S(a,b,t) smoothstep(a,b,t)
mat2 Rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
vec2 hash(vec2 p){p=vec2(dot(p,vec2(2127.1,81.17)),dot(p,vec2(1269.5,283.37)));return fract(sin(p)*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);float n=mix(mix(dot(-1.0+2.0*hash(i+vec2(0.0,0.0)),f-vec2(0.0,0.0)),dot(-1.0+2.0*hash(i+vec2(1.0,0.0)),f-vec2(1.0,0.0)),u.x),mix(dot(-1.0+2.0*hash(i+vec2(0.0,1.0)),f-vec2(0.0,1.0)),dot(-1.0+2.0*hash(i+vec2(1.0,1.0)),f-vec2(1.0,1.0)),u.x),u.y);return 0.5+0.5*n;}
void mainImage(out vec4 o, vec2 C){
  float t=iTime*uTimeSpeed;
  vec2 uv=C/iResolution.xy;
  float ratio=iResolution.x/iResolution.y;
  vec2 tuv=uv-0.5+uCenterOffset;
  tuv/=max(uZoom,0.001);

  float degree=noise(vec2(t*0.1,tuv.x*tuv.y)*uNoiseScale);
  tuv.y*=1.0/ratio;
  tuv*=Rot(radians((degree-0.5)*uRotationAmount+180.0));
  tuv.y*=ratio;

  float frequency=uWarpFrequency;
  float ws=max(uWarpStrength,0.001);
  float amplitude=uWarpAmplitude/ws;
  float warpTime=t*uWarpSpeed;
  tuv.x+=sin(tuv.y*frequency+warpTime)/amplitude;
  tuv.y+=sin(tuv.x*(frequency*1.5)+warpTime)/(amplitude*0.5);

  vec3 colLav=uColor1;
  vec3 colOrg=uColor2;
  vec3 colDark=uColor3;
  float b=uColorBalance;
  float s=max(uBlendSoftness,0.0);
  mat2 blendRot=Rot(radians(uBlendAngle));
  float blendX=(tuv*blendRot).x;
  float edge0=-0.3-b-s;
  float edge1=0.2-b+s;
  float v0=0.5-b+s;
  float v1=-0.3-b-s;
  vec3 layer1=mix(colDark,colOrg,S(edge0,edge1,blendX));
  vec3 layer2=mix(colOrg,colLav,S(edge0,edge1,blendX));
  vec3 col=mix(layer1,layer2,S(v0,v1,tuv.y));

  vec2 grainUv=uv*max(uGrainScale,0.001);
  if(uGrainAnimated>0.5){grainUv+=vec2(iTime*0.05);}
  float grain=fract(sin(dot(grainUv,vec2(12.9898,78.233)))*43758.5453);
  col+=(grain-0.5)*uGrainAmount;

  col=(col-0.5)*uContrast+0.5;
  float luma=dot(col,vec3(0.2126,0.7152,0.0722));
  col=mix(vec3(luma),col,uSaturation);
  col=pow(max(col,0.0),vec3(1.0/max(uGamma,0.001)));
  col=clamp(col,0.0,1.0);

  o=vec4(col,1.0);
}
void main(){
  vec4 o=vec4(0.0);
  mainImage(o,gl_FragCoord.xy);
  fragColor=o;
}
`;

function mountGrainient(container, props = {}) {
  const settings = {
    color1: "#FF9FFC",
    color2: "#5227FF",
    color3: "#B497CF",
    timeSpeed: 0.18,
    colorBalance: 0.02,
    warpStrength: 0.72,
    warpFrequency: 4.6,
    warpSpeed: 1.25,
    warpAmplitude: 64.0,
    blendAngle: -18.0,
    blendSoftness: 0.08,
    rotationAmount: 360.0,
    noiseScale: 1.8,
    grainAmount: 0.08,
    grainScale: 2.1,
    grainAnimated: false,
    contrast: 1.16,
    gamma: 1.0,

: "https://p16-she-va.ibyteimg.com/tos-alisg-i-f7lenjegsh-sg/f0562be36b8849a7936e3d38813df014~tplv-g9dfdl17fc-origin-image.image", "shop_name": "Her Jean Studio", "三级类目": "", "叶子类目": "牛仔夹克与外套", "内容场占比": "0.00%", "直播占比": "0.00%", "US销量占比": "100.00%", "UK销量占比": "0.00%", "可用库存": "29", "销量排名": "647", "是否在联盟": "In Affiliate", "商品详情页URL": "https://shop.tiktok.com/view/product/1732447320237183317?region=US&locale=en", "大码参考价": ""}, {"爆品标签": "近7天新品", "上架时间": "2026/7/5", "SPU": "S260630024693", "首图 url": "https://p16-she-va.ibyteimg.com/tos-alisg-i-f7lenjegsh-sg/0cc8986fa1ee4d37b1ffe8b10ba49bc6~tplv-g9dfdl17fc-origin-image.image", "shop_name": "Topbuy Time", "三级类目": "女士上装", "叶子类目": "女士背心&吊带衫", "内容场占比": "0.00%", "直播占比": "0.00%", "US销量占比": "50.00%", "UK销量占比": "50.00%", "可用库存": "13", "销量排名": "648", "是否在联盟": "In Affiliate", "商品详情页URL": "https://shop.tiktok.com/view/product/1732466567429263594?region=US&locale=en", "大码参考价": ""}, {"爆品标签": "近7天新品", "上架时间": "2026/7/5", "SPU": "S260606011853", "首图 url": "https://p16-she-va.ibyteimg.com/tos-alisg-i-f7lenjegsh-sg/05bdc93f977c4c2e8d25d8cc121e28d1~tplv-g9dfdl17fc-origin-image.image", "shop_name": "URBAN SISTER girl", "三级类目": "女士连衣裙", "叶子类目": "伴娘服", "内容场占比": "0.00%", "直播占比": "0.00%", "US销量占比": "0.00%", "UK销量占比": "100.00%", "可用库存": "17", "销量排名": "649", "是否在联盟": "In Affiliate", "商品详情页URL": "https://shop.tiktok.com/view/product/1732429822321463741?region=US&locale=en", "大码参考价": ""}, {"爆品标签": "近7天新品", "上架时间": "2026/7/5", "SPU": "S260630013732", "首图 url": "https://p16-she-va.ibyteimg.com/tos-alisg-i-f7lenjegsh-sg/5ad9bf6c5d9b4581bb4bba755ba325be~tplv-g9dfdl17fc-origin-image.image", "shop_name": "HOTFLIX GIRL", "三级类目": "女士下装", "叶子类目": "长裤", "内容场占比": "0.00%", "直播占比": "0.00%", "US销量占比": "71.40%", "UK销量占比": "0.00%", "可用库存": "64", "销量排名": "650", "是否在联盟": "In Affiliate", "商品详情页URL": "https://shop.tiktok.com/view/product/1732466415924776964?region=US&locale=en", "大码参考价": ""}];
</script>
  <script>
(function () {
  const DATA_URL = "data.csv";
  const POOL_KEY = "plus_size_product_selection_pool_v3";
  const DETAIL_KEYS = ["商品详情页URL", "商品详情链接", "详情链接", "商品链接", "链接", "Product URL", "product_url", "url"];
  const IMAGE_KEYS = ["首图 url", "首图URL", "图片URL", "商品图片", "图片链接", "Image URL", "image_url", "image"];

  const state = {
    products: loadProducts(),
    source: "data.csv · 内置数据",
    activeView: "products",
    selectedIds: loadIdSet(POOL_KEY),
    exportIds: new Set(),
    query: "",
    tag: "全部标签",
    category: "全部三级类目",
    leafCategory: "全部叶子类目"
  };

  const els = {
    fileInput: document.getElementById("fileInput"),
    exportButton: document.getElementById("exportButton"),
    productPoolTab: document.getElementById("productPoolTab"),
    selectionPoolTab: document.getElementById("selectionPoolTab"),
    poolCount: document.getElementById("poolCount"),
    productToolbar: document.getElementById("productToolbar"),
    selectionToolbar: document.getElementById("selectionToolbar"),
    selectAllInput: document.getElementById("selectAllInput"),
    clearPoolButton: document.getElementById("clearPoolButton"),
    searchInput: document.getElementById("searchInput"),
    tagFilter: document.getElementById("tagFilter"),
    categoryFilter: document.getElementById("categoryFilter"),
    leafCategoryFilter: document.getElementById("leafCategoryFilter"),
    resetButton: document.getElementById("resetButton"),
    productGrid: document.getElementById("productGrid"),
    emptyState: document.getElementById("emptyState"),
    notice: document.getElementById("notice"),
    totalCount: document.getElementById("totalCount"),
    storeCount: document.getElementById("storeCount"),
    categoryCount: document.getElementById("categoryCount"),
    updatedAt: document.getElementById("updatedAt"),
    template: document.getElementById("productCardTemplate")
  };

  els.fileInput.addEventListener("change", handleFileUpload);
  els.exportButton.addEventListener("click", exportCheckedProducts);
  els.productPoolTab.addEventListener("click", () => {
    state.activeView = "products";
    render();
  });
  els.selectionPoolTab.addEventListener("click", () => {
    state.activeView = "selection";
    render();
  });
  els.selectAllInput.addEventListener("change", (event) => {
    const poolProducts = getPoolProducts();
    state.exportIds = event.target.checked ? new Set(poolProducts.map((item) => item.id)) : new Set();
    render();
  });
  els.clearPoolButton.addEventListener("click", () => {
    state.selectedIds = new Set();
    state.exportIds = new Set();
    savePool();
    render();
    showNotice("圈品池已清空。");
  });
  els.searchInput.addEventListener("input", (event) => {
    state.query = event.target.value.trim().toLowerCase();
    render();
  });
  els.tagFilter.addEventListener("change", (event) => {
    state.tag = event.target.value;
    render();
  });
  els.categoryFilter.addEventListener("change", (event) => {
    state.category = event.target.value;
    render();
  });
  els.leafCategoryFilter.addEventListener("change", (event) => {
    state.leafCategory = event.target.value;
    render();
  });
  els.resetButton.addEventListener("click", () => {
      loadRemoteProducts(true);
  });

  render();
  loadRemoteProducts();

  function loadProducts() {
    return normalizeRows(window.INITIAL_PRODUCTS || []);
  }

  async function loadRemoteProducts(showSuccess) {
    try {
      const response = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const rows = rowsToObjects(parseCsv(await response.text()));
      const products = normalizeRows(rows);
      if (!products.length) throw new Error("data.csv 中没有可识别的商品数据。");
      setProducts(products, `data.csv · ${formatNow()}`);
      if (showSuccess) showNotice(`已重新加载 ${products.length} 条线上商品明细。`);
    } catch (error) {
      console.warn("Unable to load remote data.csv", error);
      if (showSuccess) showNotice("读取 data.csv 失败，已保留当前页面数据。", true);
    }
  }

  function loadIdSet(key) {
    try {
      return new Set(JSON.parse(localStorage.getItem(key) || "[]"));
    } catch (error) {
      console.warn("Unable to load selected products", error);
      return new Set();
    }
  }

  async function handleFileUpload(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;

    try {
      const rows = await readFile(file);
      const normalized = normalizeRows(rows);
      if (!normalized.length) {
        throw new Error("文件中没有可识别的商品数据。");
      }

      setProducts(normalized, `${file.name} · 本机临时预览 ${formatNow()}`);
      els.searchInput.value = "";
      showNotice(`已导入 ${normalized.length} 条商品。此导入仅为本机临时预览，不会同步给机构。`);
    } catch (error) {
      showNotice(error.message || "导入失败，请检查文件格式。", true);
    } finally {
      event.target.value = "";
    }
  }

  function readFile(file) {
    const extension = file.name.split(".").pop().toLowerCase();
    if (extension === "csv") return readCsv(file);
    if (extension === "xlsx" || extension === "xls") return readWorkbook(file);
    return Promise.reject(new Error("暂仅支持 .xlsx、.xls 和 .csv 文件。"));
  }

  function readCsv(file) {
    return file.text().then((text) => rowsToObjects(parseCsv(text)));
  }

  function readWorkbook(file) {
    if (!window.XLSX) {
      return Promise.reject(new Error("Excel 解析组件未加载，请联网后刷新页面再上传 .xlsx 文件。"));
    }

    return file.arrayBuffer().then((buffer) => {
      const workbook = XLSX.read(buffer, { type: "array" });
      const sheetName = workbook.SheetNames[0];
      if (!sheetName) throw new Error("Excel 文件中没有工作表。");
      return XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });
    });
  }

  function parseCsv(text) {
    const rows = [];
    let row = [];
    let field = "";
    let inQuotes = false;
    const content = text.replace(/^\uFEFF/, "");

    for (let i = 0; i < content.length; i += 1) {
      const char = content[i];
      const next = content[i + 1];

      if (char === '"' && inQuotes && next === '"') {
        field += '"';
        i += 1;
      } else if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === "," && !inQuotes) {
        row.push(field);
        field = "";
      } else if ((char === "\n" || char === "\r") && !inQuotes) {
        if (char === "\r" && next === "\n") i += 1;
        row.push(field);
        if (row.some((value) => String(value).trim())) rows.push(row);
        row = [];
        field = "";
      } else {
        field += char;
      }
    }

    row.push(field);
    if (row.some((value) => String(value).trim())) rows.push(row);
    return rows;
  }

  function rowsToObjects(rows) {
    if (!rows.length) return [];
    const headers = rows[0].map((header, index) => String(header || `未命名列${index + 1}`).trim());
    return rows.slice(1).map((row) => {
      const object = {};
      headers.forEach((header, index) => {
        if (header) object[header] = row[index] || "";
      });
      return object;
    });
  }

  function normalizeRows(rows) {
    return rows
      .map((row) => {
        const clean = {};
        Object.entries(row || {}).forEach(([key, value]) => {
          const name = String(key || "").trim();
          if (!name || name.startsWith("__EMPTY")) return;
          clean[name] = value == null ? "" : String(value).trim();
        });

        const spu = getValue(clean, ["SPU", "spu"]);
        const pid = getValue(clean, ["PID", "pid", "商品ID", "Product ID"]);
        const imageUrl = getValue(clean, IMAGE_KEYS);
        return {
          raw: clean,
          id: spu || pid || imageUrl || JSON.stringify(clean),
          pid,
          spu,
          country: getValue(clean, ["国家", "Country", "country"]),
          store: getValue(clean, ["shop_name", "店铺名称", "店铺", "Store", "store"]),
          secondCategory: getValue(clean, ["二级类目", "Second Category"]),
          thirdCategory: getValue(clean, ["三级类目", "类目", "Category", "category"]),
          leafCategory: getValue(clean, ["叶子类目", "Leaf Category"]),
          listedAt: getValue(clean, ["上架时间", "首次上架日期", "上架日期", "Listed Date", "date"]),
          tag: getValue(clean, ["爆品标签", "新老品标签", "标签", "Tag", "tag"]),
          contentShare: getValue(clean, ["内容场占比", "Content Share", "content_share"]),
          liveShare: getValue(clean, ["直播占比", "Live Share", "live_share"]),
          usShare: getValue(clean, ["US销量占比", "US 销量占比", "US Sales Share", "us_share"]),
          ukShare: getValue(clean, ["UK销量占比", "UK 销量占比", "UK Sales Share", "uk_share"]),
          stock: getValue(clean, ["可用库存", "库存", "Available Stock", "stock"]),
          salesRank: getValue(clean, ["销量排名", "排名", "Sales Rank", "sales_rank"]),
          affiliate: getValue(clean, ["是否在联盟", "联盟", "Affiliate", "affiliate"]),
          price: getValue(clean, ["大码参考价", "营销价", "价格", "Price", "price"]),
          imageUrl,
          detailUrl: getDetailUrl(clean, pid, spu)
        };
      })
      .filter((item) => item.spu || item.pid || item.imageUrl);
  }

  function getValue(row, keys) {
    for (const key of keys) {
      if (row[key]) return row[key];
    }

    const lowerMap = Object.fromEntries(Object.keys(row).map((key) => [key.toLowerCase(), key]));
    for (const key of keys) {
      const matched = lowerMap[String(key).toLowerCase()];
      if (matched && row[matched]) return row[matched];
    }
    return "";
  }

  function getDetailUrl(row, pid, spu) {
    const explicit = getValue(row, DETAIL_KEYS);
    if (explicit && /^https?:\/\//i.test(explicit)) return explicit;
    if (pid) return `https://www.tiktok.com/shop/product/${encodeURIComponent(pid)}`;
    if (spu) return `https://www.tiktok.com/shop/search?q=${encodeURIComponent(spu)}`;
    return "#";
  }

  function setProducts(products, source) {
    state.products = products;
    state.source = source;
    state.tag = "全部标签";
    state.category = "全部三级类目";
    state.leafCategory = "全部叶子类目";
    state.query = "";
    state.activeView = "products";
    pruneSelection();
    render();
  }

  function pruneSelection() {
    const validIds = new Set(state.products.map((item) => item.id));
    state.selectedIds = new Set([...state.selectedIds].filter((id) => validIds.has(id)));
    state.exportIds = new Set([...state.exportIds].filter((id) => validIds.has(id)));
    savePool();
  }

  function render() {
    updateFilters();
    updateViewControls();
    const products = state.activeView === "selection" ? getPoolProducts() : getFilteredProducts();
    renderStats(products);
    renderCards(products);
  }

  function updateViewControls() {
    const inSelection = state.activeView === "selection";
    els.productPoolTab.classList.toggle("is-active", !inSelection);
    els.selectionPoolTab.classList.toggle("is-active", inSelection);
    els.productToolbar.hidden = inSelection;
    els.selectionToolbar.hidden = !inSelection;
    els.poolCount.textContent = getPoolProducts().length.toLocaleString("zh-CN");
    els.exportButton.disabled = !(inSelection && state.exportIds.size > 0);

    const poolProducts = getPoolProducts();
    els.selectAllInput.checked = poolProducts.length > 0 && poolProducts.every((item) => state.exportIds.has(item.id));
    els.selectAllInput.indeterminate = poolProducts.some((item) => state.exportIds.has(item.id)) && !els.selectAllInput.checked;
  }

  function updateFilters() {
    fillSelect(els.tagFilter, "全部标签", unique(state.products.map((item) => item.tag)));
    fillSelect(els.categoryFilter, "全部三级类目", unique(state.products.map((item) => item.thirdCategory)));
    fillSelect(els.leafCategoryFilter, "全部叶子类目", unique(state.products.map((item) => item.leafCategory)));
    els.tagFilter.value = state.tag;
    els.categoryFilter.value = state.category;
    els.leafCategoryFilter.value = state.leafCategory;
  }

  function fillSelect(select, allLabel, values) {
    const current = select.value || allLabel;
    select.innerHTML = "";
    [allLabel, ...values].forEach((value) => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.append(option);
    });
    select.value = values.includes(current) || current === allLabel ? current : allLabel;
  }

  function getFilteredProducts() {
    return state.products.filter((item) => {
      const matchesTag = state.tag === "全部标签" || item.tag === state.tag;
      const matchesCategory = state.category === "全部三级类目" || item.thirdCategory === state.category;
      const matchesLeafCategory = state.leafCategory === "全部叶子类目" || item.leafCategory === state.leafCategory;
      const haystack = [item.spu, item.store, item.thirdCategory, item.leafCategory, item.tag].join(" ").toLowerCase();
      return matchesTag && matchesCategory && matchesLeafCategory && haystack.includes(state.query);
    });
  }

  function getPoolProducts() {
    return state.products.filter((item) => state.selectedIds.has(item.id));
  }

  function renderStats(products) {
    els.totalCount.textContent = products.length.toLocaleString("zh-CN");
    els.storeCount.textContent = unique(products.map((item) => item.store)).length.toLocaleString("zh-CN");
    els.categoryCount.textContent = unique(products.map((item) => item.thirdCategory)).length.toLocaleString("zh-CN");
    els.updatedAt.textContent = state.source;
  }

  function renderCards(products) {
    els.productGrid.innerHTML = "";
    const fragment = document.createDocumentFragment();

    products.forEach((item) => {
      const node = els.template.content.cloneNode(true);
      const image = node.querySelector("img");
      const spu = node.querySelector(".spu");
      const selectButton = node.querySelector(".select-button");
      const poolCheck = node.querySelector(".pool-check");
      const poolCheckbox = node.querySelector(".pool-checkbox");
      const selected = state.selectedIds.has(item.id);
      const inSelection = state.activeView === "selection";

      image.src = item.imageUrl || placeholderImage();
      image.alt = item.spu ? `商品 ${item.spu} 图片` : "商品图片";
      image.onerror = () => {
        image.src = placeholderImage();
        image.classList.add("is-missing");
      };
      node.querySelector(".tag").textContent = item.tag || item.thirdCategory || "商品";
      selectButton.hidden = inSelection;
      selectButton.disabled = selected;
      selectButton.textContent = selected ? "Selected" : "Select";
      selectButton.addEventListener("click", () => selectProduct(item));
      poolCheck.hidden = !inSelection;
      poolCheckbox.checked = state.exportIds.has(item.id);
      poolCheckbox.addEventListener("change", (event) => {
        if (event.target.checked) {
          state.exportIds.add(item.id);
        } else {
          state.exportIds.delete(item.id);
        }
        render();
      });
      spu.textContent = item.spu || "查看详情";
      spu.href = item.detailUrl;
      node.querySelector(".content-share").textContent = formatValue(item.contentShare);
      node.querySelector(".live-share").textContent = formatValue(item.liveShare);
      node.querySelector(".us-share").textContent = formatValue(item.usShare);
      node.querySelector(".uk-share").textContent = formatValue(item.ukShare);
      node.querySelector(".sales-rank").textContent = item.salesRank ? `#${item.salesRank}` : "未提供";
      node.querySelector(".affiliate").textContent = formatValue(item.affiliate);
      node.querySelector(".price").textContent = formatPrice(item.price);
      node.querySelector(".date").textContent = formatValue(item.listedAt);
      fragment.append(node);
    });

    els.productGrid.append(fragment);
    els.emptyState.hidden = products.length > 0;
  }

  function unique(values) {
    return [...new Set(values.map((value) => String(value || "").trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-CN"));
  }

  function formatValue(value) {
    return value ? value : "未提供";
  }

  function formatPrice(value) {
    if (!value) return "未提供";
    return /^\d+(\.\d+)?$/.test(value) ? `$${value}` : value;
  }

  function selectProduct(item) {
    state.selectedIds.add(item.id);
    state.exportIds.add(item.id);
    savePool();
    render();
    showNotice("已加入圈品池。");
  }

  function savePool() {
    localStorage.setItem(POOL_KEY, JSON.stringify([...state.selectedIds]));
  }

  function exportCheckedProducts() {
    const rows = getPoolProducts().filter((item) => state.exportIds.has(item.id));
    if (!rows.length) {
      showNotice("请先勾选需要导出的商品。", true);
      return;
    }

    const headers = unique(rows.flatMap((item) => Object.keys(item.raw)));
    const tableRows = [headers, ...rows.map((item) => headers.map((header) => item.raw[header] || ""))]
      .map((row) => `<tr>${row.map((cell) => `<td class="text-cell">${escapeHtml(cell)}</td>`).join("")}</tr>`)
      .join("");
    const workbook = `<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    table { border-collapse: collapse; }
    td { border: 1px solid #d9dde3; padding: 4px 8px; }
    .text-cell { mso-number-format:"\\@"; }
  </style>
</head>
<body>
  <table>${tableRows}</table>
</body>
</html>`;
    const blob = new Blob(["\uFEFF" + workbook], { type: "application/vnd.ms-excel;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `圈品池导出_${formatFileDate()}.xls`;
    document.body.append(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
    showNotice(`已导出 ${rows.length} 个商品。`);
  }

  function escapeHtml(value) {
    const text = String(value == null ? "" : value);
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function showNotice(message, isError) {
    els.notice.textContent = message;
    els.notice.classList.toggle("error", Boolean(isError));
    els.notice.hidden = false;
    window.clearTimeout(showNotice.timer);
    showNotice.timer = window.setTimeout(() => {
      els.notice.hidden = true;
    }, 5200);
  }

  function formatNow() {
    return new Intl.DateTimeFormat("zh-CN", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    }).format(new Date());
  }

  function formatFileDate() {
    const date = new Date();
    const pad = (value) => String(value).padStart(2, "0");
    return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}`;
  }

  function placeholderImage() {
    return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="600" height="750" viewBox="0 0 600 750">
        <rect width="600" height="750" fill="#eef1f4"/>
        <path d="M190 320h220v150H190z" fill="none" stroke="#9aa7b5" stroke-width="14"/>
        <circle cx="250" cy="270" r="42" fill="#c7d0da"/>
        <path d="M218 432l70-78 58 62 36-38 60 54" fill="none" stroke="#9aa7b5" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="300" y="535" fill="#687385" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">No Image</text>
      </svg>
    `);
  }
}());

</script>
</body>
</html>
